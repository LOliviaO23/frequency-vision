<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FrequencyVision VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #04000f; font-family: 'Georgia', serif; overflow: hidden; }

    #loading-screen {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #120028 0%, #04000f 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 9999; gap: 20px;
      transition: opacity 0.8s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .logo-ring {
      width: 80px; height: 80px;
      border: 2px solid rgba(168, 85, 247, 0.3);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: relative;
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(236, 72, 153, 0.2);
      border-bottom-color: #ec4899;
      border-radius: 50%;
      animation: spin 1.5s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-title { font-size: 22px; font-weight: 300; letter-spacing: 3px; color: #e2c5ff; }
    #loading-sub { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
    #loading-status { font-size: 12px; color: rgba(168, 85, 247, 0.7); min-height: 18px; }

    #enter-vr-overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 40px;
      z-index: 100; pointer-events: none;
      gap: 12px;
    }
    #enter-vr-overlay.visible { display: flex; }
    #enter-vr-overlay button { pointer-events: all; }

    .vr-btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .vr-btn-primary {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
    }
    .vr-btn-primary:hover { box-shadow: 0 0 45px rgba(168, 85, 247, 0.6); transform: scale(1.03); }
    .vr-btn-back {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
    }
    .vr-btn-back:hover { background: rgba(255,255,255,0.12); }

    #kit-info-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 24px;
      background: linear-gradient(to bottom, rgba(4,0,15,0.9), transparent);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50; pointer-events: none;
    }
    #kit-info-bar.hidden { display: none; }
    .kit-name { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
    .kit-freq { font-size: 12px; color: rgba(168,85,247,0.8); }
    #progress-bar { height: 2px; background: rgba(255,255,255,0.1); flex: 1; margin: 0 20px; border-radius: 1px; }
    #progress-fill { height: 100%; background: linear-gradient(to right, #7c3aed, #ec4899); border-radius: 1px; width: 0%; transition: width 0.5s ease; }
    #affirmation-counter { font-size: 12px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-ring"></div>
  <div id="loading-title">FREQUENCYVISION VR</div>
  <div id="loading-sub">IMMERSIVE MIND PROGRAMMING</div>
  <div id="loading-status">Initializing scene...</div>
</div>

<div id="kit-info-bar">
  <div>
    <div class="kit-name" id="ui-kit-name">Loading...</div>
    <div class="kit-freq" id="ui-kit-freq"></div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="affirmation-counter">1 / 10</div>
</div>

<div id="enter-vr-overlay">
  <button class="vr-btn vr-btn-primary" id="btn-enter-vr">Enter VR Headset</button>
  <button class="vr-btn vr-btn-back" onclick="history.back()">← Back to Kit</button>
</div>

<a-scene id="vr-scene" style="display:none"
  vr-mode-ui="enabled: true"
  background="color: #04000f"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  loading-screen="dotsColor: #a855f7; backgroundColor: #04000f">

  <a-assets timeout="5000"></a-assets>

  <!-- Environment Sky -->
  <a-sky id="main-sky" color="#06001c" radius="100"></a-sky>

  <!-- Star field (generated by JS) -->
  <a-entity id="star-field-far"></a-entity>
  <a-entity id="star-field-mid"></a-entity>

  <!-- Nebula glow spheres -->
  <a-sphere position="8 3 -15" radius="4" color="#7c3aed" opacity="0.06" shader="flat"></a-sphere>
  <a-sphere position="-10 -2 -20" radius="6" color="#4f46e5" opacity="0.05" shader="flat"></a-sphere>
  <a-sphere position="5 -6 -12" radius="3" color="#ec4899" opacity="0.04" shader="flat"></a-sphere>

  <!-- Orbiting frequency rings -->
  <a-entity id="ring-group" position="0 0 0">
    <a-torus
      id="outer-ring"
      radius="3.5" radius-tubular="0.015"
      color="#7c3aed" opacity="0.25" shader="flat"
      rotation="70 0 0"
      animation="property: rotation; from: 70 0 0; to: 70 360 0; dur: 18000; loop: true; easing: linear">
    </a-torus>
    <a-torus
      id="mid-ring"
      radius="2.2" radius-tubular="0.01"
      color="#a855f7" opacity="0.3" shader="flat"
      rotation="-50 30 0"
      animation="property: rotation; from: -50 30 0; to: -50 390 0; dur: 12000; loop: true; easing: linear">
    </a-torus>
    <a-torus
      id="inner-ring"
      radius="1.3" radius-tubular="0.008"
      color="#ec4899" opacity="0.35" shader="flat"
      rotation="20 -45 0"
      animation="property: rotation; from: 20 -45 0; to: 20 315 0; dur: 8000; loop: true; easing: linear">
    </a-torus>
  </a-entity>

  <!-- Floating orbs for depth -->
  <a-sphere id="orb1" position="-3 0.5 -5" radius="0.08" color="#a855f7" opacity="0.6" shader="flat"
    animation="property: position; from: -3 0.5 -5; to: -3 0.9 -5; dur: 4000; loop: true; dir: alternate; easing: easeInOutSine">
  </a-sphere>
  <a-sphere id="orb2" position="3 -0.3 -5" radius="0.06" color="#ec4899" opacity="0.5" shader="flat"
    animation="property: position; from: 3 -0.3 -5; to: 3 0.1 -5; dur: 3200; loop: true; dir: alternate; easing: easeInOutSine">
  </a-sphere>
  <a-sphere id="orb3" position="0 1.8 -6" radius="0.05" color="#7c3aed" opacity="0.4" shader="flat"
    animation="property: position; from: 0 1.8 -6; to: 0 1.4 -6; dur: 5000; loop: true; dir: alternate; easing: easeInOutSine">
  </a-sphere>

  <!-- Affirmation panel (in front, centered at eye level) -->
  <a-entity id="affirmation-panel" position="0 0 -3">

    <!-- Glow backdrop -->
    <a-plane
      id="affirmation-glow"
      width="4.5" height="1.4"
      color="#4a0080" opacity="0.15" shader="flat"
      position="0 0 -0.02">
    </a-plane>

    <!-- Number indicator -->
    <a-text
      id="aff-number"
      value="01"
      position="0 0.62 0"
      align="center"
      color="#7c3aed"
      width="2"
      opacity="0.6"
      scale="0.55 0.55 0.55">
    </a-text>

    <!-- Main affirmation text -->
    <a-text
      id="aff-main"
      value=""
      position="0 0.1 0"
      align="center"
      color="#ffffff"
      width="5"
      wrap-count="38"
      line-height="60"
      opacity="0">
    </a-text>

    <!-- Subtle divider line -->
    <a-plane
      width="2" height="0.004"
      color="#7c3aed" opacity="0.5" shader="flat"
      position="0 -0.35 0">
    </a-plane>

  </a-entity>

  <!-- Kit header (above eye level) -->
  <a-entity position="0 1.5 -4">
    <a-text
      id="kit-freq-3d"
      value=""
      align="center"
      color="#a855f7"
      width="4"
      opacity="0.7"
      scale="0.7 0.7 0.7">
    </a-text>
    <a-text
      id="kit-title-3d"
      value=""
      align="center"
      color="#e2c5ff"
      width="5"
      position="0 -0.25 0"
      opacity="0.5"
      scale="0.5 0.5 0.5">
    </a-text>
  </a-entity>

  <!-- Floor glow -->
  <a-plane
    rotation="-90 0 0"
    width="12" height="12"
    color="#3b0070" opacity="0.08" shader="flat"
    position="0 -1.5 0">
  </a-plane>

  <!-- Brand watermark (below) -->
  <a-text
    value="FREQUENCYVISION VR"
    position="0 -1.3 -4"
    align="center"
    color="#4a1470"
    width="3"
    opacity="0.35"
    scale="0.45 0.45 0.45">
  </a-text>

  <!-- Camera with smooth look controls -->
  <a-camera
    id="main-camera"
    look-controls="reverseMouseDrag: false; touchEnabled: true; magicWindowTrackingEnabled: true"
    wasd-controls="enabled: false"
    position="0 0 0">
    <a-cursor
      color="#a855f7"
      opacity="0.5"
      scale="0.6 0.6 0.6"
      animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 0.6 0.6 0.6; dur: 150">
    </a-cursor>
  </a-camera>

</a-scene>

<script>
(function () {
  'use strict';

  const params = new URLSearchParams(location.search);
  const kitId = params.get('kitId');
  const loadingEl = document.getElementById('loading-screen');
  const statusEl = document.getElementById('loading-status');
  const scene = document.getElementById('vr-scene');
  const vrOverlay = document.getElementById('enter-vr-overlay');
  const infoBar = document.getElementById('kit-info-bar');

  let affirmations = [];
  let currentIndex = 0;
  let cycleInterval = null;
  const DISPLAY_DURATION = 9000;

  // ── Starfield generator ──────────────────────────────────────────────────
  function createStars(containerId, count, radius, minSize, maxSize, opacity) {
    const container = document.getElementById(containerId);
    for (let i = 0; i < count; i++) {
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = 2 * Math.PI * Math.random();
      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.sin(phi) * Math.sin(theta);
      const z = radius * Math.cos(phi);
      const size = minSize + Math.random() * (maxSize - minSize);
      const bright = 0.5 + Math.random() * 0.5;
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('position', `${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`);
      sphere.setAttribute('radius', size.toFixed(4));
      sphere.setAttribute('color', `rgb(${Math.round(200 * bright)},${Math.round(170 * bright)},${Math.round(255 * bright)})`);
      sphere.setAttribute('opacity', (opacity * (0.5 + Math.random() * 0.5)).toFixed(2));
      sphere.setAttribute('shader', 'flat');
      sphere.setAttribute('segments-height', '4');
      sphere.setAttribute('segments-width', '4');
      container.appendChild(sphere);
    }
  }

  // ── Affirmation cycling ──────────────────────────────────────────────────
  function showAffirmation(index) {
    if (!affirmations.length) return;
    const aff = affirmations[index % affirmations.length];
    const textEl = document.getElementById('aff-main');
    const numEl = document.getElementById('aff-number');
    const counter = document.getElementById('affirmation-counter');
    const fill = document.getElementById('progress-fill');

    numEl.setAttribute('value', String(index + 1).padStart(2, '0'));
    counter.textContent = `${index + 1} / ${affirmations.length}`;
    const pct = ((index + 1) / affirmations.length) * 100;
    fill.style.width = pct + '%';

    // Fade out
    textEl.setAttribute('animation__out', 'property: opacity; from: 1; to: 0; dur: 500; easing: easeInQuad');
    setTimeout(() => {
      textEl.setAttribute('value', aff.text);
      // Fade in
      textEl.setAttribute('animation__in', 'property: opacity; from: 0; to: 1; dur: 800; easing: easeOutQuad');
    }, 520);
  }

  function startCycle() {
    showAffirmation(0);
    cycleInterval = setInterval(() => {
      currentIndex = (currentIndex + 1) % affirmations.length;
      showAffirmation(currentIndex);
    }, DISPLAY_DURATION);
  }

  // ── Load kit data ────────────────────────────────────────────────────────
  async function loadKit() {
    if (!kitId) {
      statusEl.textContent = 'No kit specified.';
      return;
    }

    try {
      statusEl.textContent = 'Loading kit data...';
      const res = await fetch(`/api/full-kit/${kitId}`);
      if (!res.ok) throw new Error('Kit not found');
      const { kit, affirmations: affs } = await res.json();

      affirmations = affs || [];

      // Update UI info bar
      document.getElementById('ui-kit-name').textContent = kit.title;
      document.getElementById('ui-kit-freq').textContent =
        `${kit.frequencyHz} Hz · ${kit.frequencyType}`;

      // Update 3D scene text
      document.getElementById('kit-freq-3d').setAttribute(
        'value', `✦  ${kit.frequencyHz} Hz · ${kit.frequencyType}  ✦`
      );
      document.getElementById('kit-title-3d').setAttribute('value', kit.title.toUpperCase());

      statusEl.textContent = 'Creating your universe...';

      // Show scene
      scene.style.display = '';

      // Wait for A-Frame to be ready
      scene.addEventListener('loaded', () => {
        statusEl.textContent = 'Painting the stars...';
        createStars('star-field-far', 180, 65, 0.04, 0.10, 0.6);
        createStars('star-field-mid', 80, 35, 0.03, 0.07, 0.5);

        setTimeout(() => {
          loadingEl.classList.add('hidden');
          setTimeout(() => { loadingEl.style.display = 'none'; }, 900);
          vrOverlay.classList.add('visible');
          startCycle();
        }, 600);
      });

    } catch (err) {
      statusEl.textContent = 'Failed to load kit: ' + err.message;
    }
  }

  // ── Enter VR button ──────────────────────────────────────────────────────
  document.getElementById('btn-enter-vr').addEventListener('click', () => {
    if (scene.is('vr-mode')) {
      scene.exitVR();
    } else {
      scene.enterVR();
    }
  });

  scene.addEventListener('enter-vr', () => {
    infoBar.classList.add('hidden');
    document.getElementById('btn-enter-vr').textContent = 'Exit VR';
  });
  scene.addEventListener('exit-vr', () => {
    infoBar.classList.remove('hidden');
    document.getElementById('btn-enter-vr').textContent = 'Enter VR Headset';
  });

  // ── Boot ─────────────────────────────────────────────────────────────────
  loadKit();

}());
</script>
</body>
</html>
